name: Build kernel

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache bootlin toolchain
        uses: actions/cache@v4
        with:
          path: ~/l4t-gcc
          key: l4t-gcc-${{ hashFiles('bsp_version.env') }}

      - name: Download BSP
        run: ./setup.sh --force

      - name: Build kernel for PAB
        run: ./build.sh PAB
